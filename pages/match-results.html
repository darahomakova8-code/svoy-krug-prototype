<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Совпадения - СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/match-results.css">
</head>
<body>
    <div class="match-container">
        <!-- Шапка -->
        <div class="match-header">
            <div class="back-btn" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1>Результаты опроса</h1>
            <div style="width: 32px;"></div>
        </div>
        
        <div class="match-content">
            <!-- Хорошие новости -->
            <div class="good-news">
                <h2>Хорошие новости!</h2>
                <p>Есть <span id="matchCount">2</span> события, которые понравились каждому</p>
            </div>
            
            <!-- Список совпадений -->
            <div id="matchesContainer">
                <!-- Контент генерируется через JS -->
            </div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons-row">
                <button class="action-btn-secondary" onclick="goBackToGroups()">
                    Вернуться к другим группам
                </button>
                <button class="action-btn-primary" onclick="goToChat()">
                    Чат группы
                </button>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/match-results.js"></script>
</body>
</html>
