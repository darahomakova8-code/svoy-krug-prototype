<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Чат - СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/chat-poll.css">
</head>
<body>
    <div class="chat-container">
        <!-- Шапка чата -->
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="back-btn" onclick="goBack()">
                    <i class="bi bi-arrow-left"></i>
                </div>
                <div class="chat-avatar">ПВ</div>
                <div class="chat-info">
                    <h2>Планы на выходные</h2>
                    <div class="participants-count">3 участника</div>
                </div>
            </div>
            <div class="chat-header-right">
                <div class="header-icon" onclick="toggleChatSideMenu()">
                    <i class="bi bi-three-dots-vertical"></i>
                </div>
            </div>
        </div>
        
        <!-- Область сообщений -->
        <div class="messages-area" id="messagesArea">
            <div id="messagesContainer"></div>
        </div>
        
        <!-- Поле ввода -->
        <div class="message-input-area">
            <div class="input-wrapper">
                <button class="attach-btn" onclick="toggleAttachPanel()">
                    <i class="bi bi-paperclip"></i>
                </button>
                <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
            </div>
            <button class="send-btn" onclick="sendMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>

        <!-- Панель для вставки файлов (скрепка) -->
        <div class="attach-preview" id="attachPanel">
            <div class="attach-option" onclick="attachPhoto()">
                <i class="bi bi-image"></i>
                <span>Фото</span>
            </div>
            <div class="attach-option" onclick="attachVideo()">
                <i class="bi bi-camera-reels"></i>
                <span>Видео</span>
            </div>
            <div class="attach-option" onclick="attachDocument()">
                <i class="bi bi-file-earmark"></i>
                <span>Документ</span>
            </div>
            <div class="attach-option" onclick="attachLocation()">
                <i class="bi bi-geo-alt"></i>
                <span>Локация</span>
            </div>
            <div class="attach-option attach-option-together" onclick="chooseTogetherFromAttach()">
                <i class="bi bi-people-fill"></i>
                <span>Выбираем Вместе</span>
            </div>
        </div>
        
        <!-- Боковое меню чата -->
        <div class="chat-side-menu" id="chatSideMenu">
            <div class="chat-side-menu-header">
                <div class="close-menu" onclick="closeChatSideMenu()">
                    <i class="bi bi-x-lg"></i>
                </div>
                <div class="chat-info" style="padding: 8px 0;">
                    <h2>Планы на выходные</h2>
                    <div class="participants-count">3 участника</div>
                </div>
            </div>
            <nav class="chat-side-menu-nav">
                <div class="chat-side-menu-item" onclick="showSettings()">
                    <i class="bi bi-gear"></i>
                    <span>Общие настройки</span>
                </div>
                <div class="chat-side-menu-item" onclick="showNotifications()">
                    <i class="bi bi-bell"></i>
                    <span>Уведомления</span>
                </div>
                <div class="chat-side-menu-item" onclick="showParticipants()">
                    <i class="bi bi-people"></i>
                    <span>Участники</span>
                </div>
                <div class="chat-side-menu-item" onclick="showSearch()">
                    <i class="bi bi-search"></i>
                    <span>Поиск</span>
                </div>
            </nav>
        </div>
        
        <div class="chat-overlay" id="chatOverlay" onclick="closeChatSideMenu()"></div>
        
        <!-- Уведомление "Ссылка скопирована" -->
        <div class="copy-toast" id="copyToast">
            <i class="bi bi-check-circle-fill"></i>
            <span>Ссылка скопирована</span>
        </div>
    </div>
    
    <script src="../assets/js/chat-poll.js"></script>
</body>
</html>
