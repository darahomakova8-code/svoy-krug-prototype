<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Киноклуб — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/community-detail.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка: стрелка назад + название -->
        <div class="detail-header">
            <div class="back-arrow" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1>Киноклуб</h1>
        </div>

        <div class="content-scroll">
            <!-- Фото сообщества (на всю ширину) -->
            <div class="community-cover-section">
                <div class="community-cover">
                    <i class="bi bi-film"></i>
                </div>
                <!-- Краткое описание с рейтингом справа внизу -->
                <div class="community-badge">
                    <div class="badge-item">
                        <div class="badge-label">Участников</div>
                        <div class="badge-value">800</div>
                    </div>
                    <div class="badge-item">
                        <div class="badge-label">Рейтинг</div>
                        <div class="badge-value">4.8 ★</div>
                    </div>
                </div>
            </div>

            <!-- Описание сообщества (белая плашка) -->
            <div class="community-description-text">
                Смотрим и обсуждаем лучшее кино. Место для тех, кто любит думать и говорить о фильмах.
            </div>

            <!-- Две кнопки -->
            <div class="action-buttons">
                <div class="action-btn chat-btn" onclick="alert('Чат сообщества (в разработке)')">
                    Чат сообщества
                </div>
                <div class="action-btn find-partner-btn" onclick="openFindPartner()">
                    Создать ивент
                </div>
            </div>

            <!-- Заголовок с фильтром -->
            <div class="section-header">
                <h2>Активные предложения</h2>
                <i class="bi bi-sliders2 filter-icon" onclick="toggleAnketaFilter()"></i>
            </div>

            <!-- Панель фильтров анкет -->
            <div class="filter-panel" id="anketaFilterPanel">
                <div class="filter-row">
                    <div class="filter-label">Пол</div>
                    <div class="gender-buttons">
                        <div class="gender-btn" data-gender="male" onclick="selectGender(this, 'male')">М</div>
                        <div class="gender-btn" data-gender="female" onclick="selectGender(this, 'female')">Ж</div>
                        <div class="gender-btn active" data-gender="any" onclick="selectGender(this, 'any')">Неважно</div>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-label">Возраст</div>
                    <div class="age-range">
                        <input type="number" id="ageMin" placeholder="От" value="18">
                        <span>-</span>
                        <input type="number" id="ageMax" placeholder="До" value="99">
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-label">Дата встречи</div>
                    <div class="date-range">
                        <input type="date" id="dateStart" value="2026-03-10">
                        <input type="date" id="dateEnd" value="2026-03-20">
                    </div>
                </div>
                <button class="apply-filters-btn" onclick="applyAnketaFilters()">Применить фильтры</button>
            </div>

            <!-- Список анкет -->
            <div id="anketasList"></div>
        </div>

        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Все мероприятия (в разработке)')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное (в разработке)')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Личный кабинет (в разработке)')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>

    <script src="../../assets/js/community-detail.js"></script>
</body>
</html>
