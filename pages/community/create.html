<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Создать сообщество — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="burger-menu" onclick="window.location.href='feed.html'">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1 class="gradient-title">СвойКруг</h1>
            <div class="header-placeholder"></div>
        </header>

        <div style="text-align: center; padding: 80px 20px;">
            <i class="bi bi-building" style="font-size: 80px; color: #F41D91; opacity: 0.5;"></i>
            <h2 style="margin: 24px 0 16px; color: #333;">Создание сообщества</h2>
            <p style="color: #666; margin-bottom: 32px;">Функция временно недоступна</p>
            <button class="create-community-btn" onclick="window.location.href='feed.html'" style="max-width: 200px; margin: 0 auto; display: block;">
                Вернуться
            </button>
        </div>

        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="window.location.href='feed.html'">
                <i class="bi bi-people-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Все мероприятия (в разработке)')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное (в разработке)')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Личный кабинет (в разработке)')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>
</body>
</html>
