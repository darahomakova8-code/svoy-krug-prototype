<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Мероприятие — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/event-detail-updated.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="event-header">
            <div class="back-arrow" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1>Мероприятие</h1>
        </div>

        <div class="event-content">
            <!-- Белая плашка с информацией -->
            <div class="info-card">
                <div class="event-title-large" id="eventTitle">Просмотр фильма Аватар</div>
                <div class="event-description" id="eventDescription">
                    Предлагаю сходить в кино на 3-ю часть Аватара, после поделиться впечатлением в кафе
                </div>
                <div class="event-details-column">
                    <div class="detail-row" id="eventDate">
                        <i class="bi bi-calendar"></i> 10 марта 2026
                    </div>
                    <div class="detail-row" id="eventLocation">
                        <i class="bi bi-geo-alt"></i> Мираж
                    </div>
                    <div class="detail-row" id="eventSeats">
                        <i class="bi bi-people"></i> 6 участников
                    </div>
                </div>
                <button class="chat-button" onclick="openChat()">Чат</button>
            </div>

            <!-- Плашка добавления друзей -->
            <div class="add-friends-card">
                <div class="add-friends-row" onclick="openAddFriendsModal()">
                    <div class="plus-icon">
                        <i class="bi bi-plus-lg"></i>
                    </div>
                    <div class="add-friends-text">Добавить друзей</div>
                </div>
            </div>

            <!-- Заголовок Участники -->
            <div class="section-title">Участники</div>

            <!-- Белая плашка с участниками (включая Надю) -->
            <div class="white-card">
                <div id="participantsList"></div>
            </div>

            <!-- Заголовок Запросы -->
            <div class="section-title">Запросы</div>

            <!-- Белая плашка с запросами (без Нади) -->
            <div class="white-card">
                <div id="requestsList"></div>
            </div>
        </div>

        <!-- Модальное окно выбора друзей -->
        <div class="friends-modal" id="friendsModal">
            <div class="friends-modal-content">
                <div class="friends-modal-header">
                    <h3>Выберите друзей</h3>
                    <i class="bi bi-x-lg" onclick="closeFriendsModal()"></i>
                </div>
                <div class="friends-modal-list" id="friendsModalList"></div>
                <button class="modal-confirm-btn" onclick="confirmAddFriends()">Добавить выбранных</button>
            </div>
        </div>

        <!-- Нижнее меню -->
        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="alert('Меню')">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Билеты')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Профиль')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>

    <script src="../../assets/js/event-detail-updated.js"></script>
</body>
</html>
