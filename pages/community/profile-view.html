<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Анкета — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/profile-view.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="profile-header">
            <div class="back-arrow" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1>Запрос</h1>
        </div>

        <!-- Боковое меню -->
        <div class="side-menu" id="sideMenu">
            <div class="side-menu-header">
                <div class="close-menu" onclick="toggleSideMenu()">
                    <i class="bi bi-x-lg"></i>
                </div>
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <div class="user-name">Гость</div>
                </div>
            </div>
            <nav class="side-menu-nav">
                <div class="side-menu-item" onclick="navigateTo('feed.html')">
                    <i class="bi bi-people-fill"></i>
                    <span>Сообщества</span>
                </div>
                <div class="side-menu-item" onclick="alert('Друзья скоро!')">
                    <i class="bi bi-person-heart"></i>
                    <span>Друзья</span>
                </div>
                <div class="side-menu-item" onclick="navigateTo('my-anketas.html')">
                    <i class="bi bi-file-text-fill"></i>
                    <span>Мои события</span>
                </div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-section-title"><span>Выбираем вместе</span></div>
                <div class="side-menu-item" onclick="navigateTo('../events/choose-together.html')">
                    <i class="bi bi-plus-circle"></i>
                    <span>Создать чат</span>
                </div>
                <div class="side-menu-item" onclick="navigateTo('pages/choose-together.html')">
                    <i class="bi bi-chat-text"></i>
                    <span>Мои чаты</span>
                </div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-item" onclick="alert('Челленджи скоро!')">
                    <i class="bi bi-trophy-fill"></i>
                    <span>Челленджи</span>
                </div>
                <div class="side-menu-item" onclick="alert('Колесо удачи скоро!')">
                    <i class="bi bi-suit-club-fill"></i>
                    <span>Колесо удачи</span>
                </div>
            </nav>
        </div>
        <div class="overlay" id="overlay" onclick="toggleSideMenu()"></div>

        <div class="profile-content">
            <!-- Белая плашка с информацией -->
            <div class="info-card">
                <div class="profile-photo-section">
                    <div class="profile-avatar-large" id="profileAvatar">Н</div>
                    <div class="profile-name-section">
                        <div class="profile-name" id="profileName">
                            Надя Кластеровна
                            <i class="bi bi-patch-check-fill verified-badge"></i>
                        </div>
                        <div class="profile-age" id="profileAge">30 лет</div>
                    </div>
                </div>
                <div class="profile-description" id="profileDescription">
                    Люблю кино, увлекаюсь просмотром детективов
                </div>
                <div class="hobbies-section">
                    <div class="hobbies-title">Хобби</div>
                    <div class="hobbies-list" id="hobbiesList">
                        <div class="hobby-tag">Беговые лыжи</div>
                        <div class="hobby-tag">Вязание</div>
                        <div class="hobby-tag">Учеба</div>
                    </div>
                </div>
            </div>

            <!-- Кнопка принятия заявки (справа, маленькая) -->
            <div class="accept-button-wrapper">
                <button class="accept-button" onclick="acceptRequest()">Принять заявку</button>
            </div>

            <!-- Заголовок Фото -->
            <div class="section-title">Фото</div>

            <!-- Сетка фото -->
            <div class="photos-grid" id="photosGrid">
                <div class="photo-placeholder"><i class="bi bi-image"></i></div>
                <div class="photo-placeholder"><i class="bi bi-image"></i></div>
                <div class="photo-placeholder"><i class="bi bi-image"></i></div>
            </div>

            <!-- Заголовок Понравившиеся -->
            <div class="section-title">Понравившиеся</div>

            <!-- Список понравившихся мероприятий -->
            <div class="liked-events-list" id="likedEventsList">
                <div class="liked-event-item">Концерт "Егор криг"</div>
                <div class="liked-event-item">Киновечер "Советское кино"</div>
                <div class="liked-event-item">Мастер класс по боксу</div>
            </div>
        </div>

        <!-- Нижнее меню -->
        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Билеты')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Профиль')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>

    <script src="../../assets/js/profile-view.js"></script>
</body>
</html>
