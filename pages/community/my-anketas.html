<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Мои анкеты — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/my-anketas.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="my-header">
            <div class="back-arrow" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1>Мои события</h1>
        </div>

        <!-- Боковое меню -->
        <div class="side-menu" id="sideMenu">
            <div class="side-menu-header">
                <div class="close-menu" onclick="toggleSideMenu()">
                    <i class="bi bi-x-lg"></i>
                </div>
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <div class="user-name">Гость</div>
                </div>
            </div>
            <nav class="side-menu-nav">
                <div class="side-menu-item" onclick="window.location.href='feed.html'">
                    <i class="bi bi-people-fill"></i>
                    <span>Сообщества</span>
                </div>
                <div class="side-menu-item" onclick="alert('Друзья скоро!')">
                    <i class="bi bi-person-heart"></i>
                    <span>Друзья</span>
                </div>
                <div class="side-menu-item" onclick="window.location.href='my-anketas.html'">
                    <i class="bi bi-file-text-fill"></i>
                    <span>>Мои события</span>
                </div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-section-title"><span>Выбираем вместе</span></div>
                <div class="side-menu-item" onclick="window.location.href='../events/choose-together.html'">
                    <i class="bi bi-plus-circle"></i>
                    <span>Создать чат</span>
                </div>
                <div class="side-menu-item" onclick="window.location.href='pages/choose-together.html'">
                    <i class="bi bi-chat-text"></i>
                    <span>Мои чаты</span>
                </div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-item" onclick="alert('Челленджи скоро!')">
                    <i class="bi bi-trophy-fill"></i>
                    <span>Челленджи</span>
                </div>
                <div class="side-menu-item" onclick="alert('Колесо удачи скоро!')">
                    <i class="bi bi-suit-club-fill"></i>
                    <span>Колесо удачи</span>
                </div>
            </nav>
        </div>
        <div class="overlay" id="overlay" onclick="toggleSideMenu()"></div>

        <div class="my-content">
            <!-- Вкладки -->
            <div class="tabs-container">
                <button class="tab-btn active" id="eventsTabBtn" onclick="switchTab('events')">
                    Мои мероприятия
                </button>
                <button class="tab-btn" id="requestsTabBtn" onclick="switchTab('requests')">
                    Мои запросы
                </button>
            </div>

            <!-- Контейнер для мероприятий (которые создал пользователь) -->
            <div id="eventsContainer"></div>

            <!-- Контейнер для запросов (на которые подал пользователь) -->
            <div id="requestsContainer" style="display: none;"></div>
        </div>

        <!-- Нижнее меню -->
        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Все мероприятия (в разработке)')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное (в разработке)')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Личный кабинет (в разработке)')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>

    <script src="../../assets/js/my-anketas.js"></script>
</body>
</html>
