<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Мероприятие — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/event-detail.css">
</head>
<body>
    <div class="app-container">
        <div class="event-header">
            <div class="header-left">
                <div class="back-arrow" onclick="goBack()"><i class="bi bi-arrow-left"></i></div>
                <h1>Мероприятие</h1>
            </div>
            <div class="delete-event-btn" onclick="deleteEvent()"><i class="bi bi-trash3"></i></div>
        </div>

        <!-- Боковое меню -->
        <div class="side-menu" id="sideMenu">
            <div class="side-menu-header">
                <div class="close-menu" onclick="toggleSideMenu()"><i class="bi bi-x-lg"></i></div>
                <div class="user-info">
                    <div class="user-avatar"><i class="bi bi-person-circle"></i></div>
                    <div class="user-name">Гость</div>
                </div>
            </div>
            <nav class="side-menu-nav">
                <div class="side-menu-item" onclick="navigateTo('feed.html')"><i class="bi bi-people-fill"></i><span>Сообщества</span></div>
                <div class="side-menu-item" onclick="alert('Друзья скоро!')"><i class="bi bi-person-heart"></i><span>Друзья</span></div>
                <div class="side-menu-item" onclick="navigateTo('my-anketas.html')"><i class="bi bi-file-text-fill"></i><span>Мои события</span></div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-section-title"><span>Выбираем вместе</span></div>
                <div class="side-menu-item" onclick="navigateTo('../events/choose-together.html')"><i class="bi bi-plus-circle"></i><span>Создать чат</span></div>
                <div class="side-menu-item" onclick="navigateTo('../events/chat.html')"><i class="bi bi-chat-text"></i><span>Мои чаты</span></div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-item" onclick="alert('Челленджи скоро!')"><i class="bi bi-trophy-fill"></i><span>Челленджи</span></div>
                <div class="side-menu-item" onclick="alert('Колесо удачи скоро!')"><i class="bi bi-suit-club-fill"></i><span>Колесо удачи</span></div>
            </nav>
        </div>
        <div class="overlay" id="overlay" onclick="toggleSideMenu()"></div>

        <div class="event-content">
            <div class="info-card">
                <div class="event-title-large" id="eventTitle"></div>
                <div class="event-description" id="eventDescription"></div>
                <div class="event-details-column">
                    <div class="detail-row" id="eventDate"></div>
                    <div class="detail-row" id="eventLocation"></div>
                    <div class="detail-row" id="eventSeats"></div>
                </div>
                <button class="chat-button" onclick="openChat()">Чат</button>
            </div>

            <!-- Плашка добавления друзей -->
            <div class="add-friends-card">
                <div class="add-friends-row" onclick="openAddFriendsModal()">
                    <div class="plus-icon"><i class="bi bi-plus-lg"></i></div>
                    <div class="add-friends-text">Добавить друзей</div>
                </div>
            </div>

            <div class="section-title">Участники</div>
            <div class="white-card"><div id="participantsList"></div></div>

            <div class="section-title">Запросы</div>
            <div class="white-card"><div id="requestsList"></div></div>
        </div>

        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()"><i class="bi bi-list"></i></div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'"><i class="bi bi-house-door-fill"></i></div>
            <div class="nav-icon-item" onclick="alert('Билеты')"><i class="bi bi-ticket-perforated-fill"></i></div>
            <div class="nav-icon-item" onclick="alert('Избранное')"><i class="bi bi-heart-fill"></i></div>
            <div class="nav-icon-item" onclick="alert('Профиль')"><i class="bi bi-person-fill"></i></div>
        </nav>
    </div>
    <script src="../../assets/js/event-detail.js"></script>
</body>
</html>
