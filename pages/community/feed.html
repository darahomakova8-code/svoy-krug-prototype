<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Найти компанию — СвойКруг</title>
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/communities.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="feed-header">
            <div class="header-left">
                <div class="back-btn" onclick="goBack()">
                    <i class="bi bi-arrow-left"></i>
                </div>
                <h1 class="page-title">Найти компанию</h1>
            </div>
            <div class="header-right">
                <div class="header-menu">
                    <i class="bi bi-three-dots-vertical menu-icon" onclick="toggleMenu()"></i>
                    <div class="menu-dropdown" id="menuDropdown">
                        <div class="menu-item" onclick="openSearch()">
                            <i class="bi bi-search"></i>
                            <span>Поиск</span>
                        </div>
                        <div class="menu-item" onclick="toggleFilterPanel()">
                            <i class="bi bi-funnel"></i>
                            <span>Фильтры</span>
                        </div>
                        <div class="menu-item" onclick="createCommunity()">
                            <i class="bi bi-plus-circle"></i>
                            <span>Создать сообщество</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Описание по центру -->
        <div class="feed-description">
            <p>
                <span class="highlight">Выбирай сообщества</span> по интересам,<br>
                находи друзей и общайся
            </p>
        </div>

        <!-- Поиск -->
        <div class="search-container" id="searchContainer">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск по сообществам..." oninput="filterCommunities()">
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filter-panel" id="filterPanel">
            <div class="filter-section">
                <div class="filter-title">Категории</div>
                <div class="filter-tags" id="categoryFilters">
                    <span class="filter-tag active" data-cat="all">Все</span>
                    <span class="filter-tag" data-cat="cinema">Кино</span>
                    <span class="filter-tag" data-cat="sport">Спорт</span>
                    <span class="filter-tag" data-cat="books">Книги</span>
                    <span class="filter-tag" data-cat="music">Музыка</span>
                    <span class="filter-tag" data-cat="art">Искусство</span>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-title">Сортировка</div>
                <div class="filter-tags" id="sortFilters">
                    <span class="filter-tag active" data-sort="default">По умолчанию</span>
                    <span class="filter-tag" data-sort="members">По участникам</span>
                    <span class="filter-tag" data-sort="new">Новые</span>
                </div>
            </div>
        </div>

        <!-- Список сообществ -->
        <div class="communities-list" id="communitiesList"></div>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="navigateTo('../../index.html')">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Все мероприятия в разработке')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное в разработке')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Личный кабинет в разработке')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>

<!-- Боковое меню -->
        <div class="side-menu" id="sideMenu">
            <div class="side-menu-header">
                <div class="close-menu" onclick="toggleSideMenu()">
                    <i class="bi bi-x-lg"></i>
                </div>
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <div class="user-name">Гость</div>
                </div>
            </div>
            <nav class="side-menu-nav">
                <div class="side-menu-item" onclick="navigateTo('feed.html')">
                    <i class="bi bi-people-fill"></i>
                    <span>Найти компанию</span>
                </div>
                <div class="side-menu-item" onclick="alert('Друзья скоро!')">
                    <i class="bi bi-person-heart"></i>
                    <span>Друзья</span>
                </div>
                <div class="side-menu-item" onclick="navigateTo('my-anketas.html')">
                    <i class="bi bi-file-text-fill"></i>
                    <span>Мои события</span>
                </div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-section-title"><span>Выбираем вместе</span></div>
                <div class="side-menu-item" onclick="navigateTo('../create-chat.html')">
                    <i class="bi bi-plus-circle"></i>
                    <span>Создать чат</span>
                </div>
                <div class="side-menu-item" onclick="navigateTo('../choose-together.html')">
                    <i class="bi bi-chat-text"></i>
                    <span>Мои чаты</span>
                </div>
                <div class="side-menu-divider"></div>
                <div class="side-menu-item" onclick="alert('Челленджи скоро!')">
                    <i class="bi bi-trophy-fill"></i>
                    <span>Челленджи</span>
                </div>
                <div class="side-menu-item" onclick="alert('Колесо удачи скоро!')">
                    <i class="bi bi-suit-club-fill"></i>
                    <span>Колесо удачи</span>
                </div>
            </nav>
        </div>
        <div class="overlay" id="overlay" onclick="toggleSideMenu()"></div>

        <div class="content-scroll" id="mainContent">
            

    <script src="../../assets/js/communities.js"></script>
</body>
</html>
