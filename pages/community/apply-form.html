<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Заявка — СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/apply-form.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="apply-header">
            <div class="back-arrow" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1>Заявка</h1>
        </div>

<!-- Боковое меню -->
<div class="side-menu" id="sideMenu">
    <div class="side-menu-header">
        <div class="close-menu" onclick="toggleSideMenu()">
            <i class="bi bi-x-lg"></i>
        </div>
        <div class="user-info">
            <div class="user-avatar">
                <i class="bi bi-person-circle"></i>
            </div>
            <div class="user-name">Гость</div>
        </div>
    </div>
    <nav class="side-menu-nav">
        <div class="side-menu-item" onclick="navigateTo('pages/community/feed.html')">
            <i class="bi bi-people-fill"></i>
            <span>Сообщества</span>
        </div>
        <div class="side-menu-item" onclick="alert('Друзья скоро!')">
            <i class="bi bi-person-heart"></i>
            <span>Друзья</span>
        </div>
        <div class="side-menu-item" onclick="navigateTo('pages/community/my-anketas.html')">
            <i class="bi bi-file-text-fill"></i>
            <span>>Мои события</span>
        </div>
        
        <div class="side-menu-divider"></div>
        
        <div class="side-menu-section-title">
            <span>Выбираем вместе</span>
        </div>
        <div class="side-menu-item" onclick="navigateTo('pages/create-chat.html')">
            <i class="bi bi-plus-circle"></i>
            <span>Создать чат</span>
        </div>
        <div class="side-menu-item" onclick="navigateTo('pages/choose-together.html')">
            <i class="bi bi-chat-text"></i>
            <span>Мои чаты</span>
        </div>
        
        <div class="side-menu-divider"></div>
        
        <div class="side-menu-item" onclick="alert('Челленджи скоро!')">
            <i class="bi bi-trophy-fill"></i>
            <span>Челленджи</span>
        </div>
        <div class="side-menu-item" onclick="alert('Колесо удачи скоро!')">
            <i class="bi bi-suit-club-fill"></i>
            <span>Колесо удачи</span>
        </div>
    </nav>
</div>
<div class="overlay" id="overlay" onclick="toggleSideMenu()"></div>

        <div class="apply-content">
            <!-- Название мероприятия -->
            <div class="event-title" id="eventTitle">Просмотр "Аватар"</div>

            <!-- Подзаголовок -->
            <div class="subtitle">
                Заполните анкету о себе, чтобы подать заявку на мероприятие
            </div>

            <!-- Кнопка автозаполнения -->
            <div class="auto-fill-btn" onclick="autoFill()">
                <i class="bi bi-magic"></i>
                <span>Автозаполнение</span>
            </div>

            <!-- Плашка 1: Имя (сверху) и Фамилия (снизу) -->
            <div class="form-card">
                <div class="form-group">
                    <label class="form-label">Имя</label>
                    <input type="text" class="form-input" id="firstName" placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label class="form-label">Фамилия</label>
                    <input type="text" class="form-input" id="lastName" placeholder="Введите фамилию">
                </div>
            </div>

            <!-- Плашка 2: Пол и Возраст (две одинаковые плашки рядом) -->
            <div class="double-card-row">
                <div class="form-card-half">
                    <label class="form-label">Пол</label>
                    <div class="gender-buttons">
                        <div class="gender-option active" data-gender="female" onclick="selectGender(this, 'female')">Женский</div>
                        <div class="gender-option" data-gender="male" onclick="selectGender(this, 'male')">Мужской</div>
                    </div>
                </div>
                <div class="form-card-half">
                    <label class="form-label">Возраст</label>
                    <input type="number" class="form-input" id="age" placeholder="18">
                </div>
            </div>

            <!-- Плашка 3: О себе -->
            <div class="form-card">
                <div class="form-group">
                    <label class="form-label">О себе</label>
                    <textarea class="form-input" id="about" placeholder="Расскажите о себе, своих интересах..."></textarea>
                </div>
            </div>

            <!-- Плашка 4: Фото -->
            <div class="form-card">
                <div class="photos-label">Фото</div>
                <div class="photos-grid" id="photosContainer">
                    <div class="photo-add" onclick="addPhoto()">
                        <i class="bi bi-plus-lg"></i>
                        <span>Добавить</span>
                    </div>
                </div>
            </div>

            <!-- Кнопка отправки -->
            <button class="submit-btn" onclick="submitApplication()">
                Отправить
            </button>
        </div>

        <!-- Нижнее меню -->
        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../../index.html'">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Билеты')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Профиль')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>

    <script src="../../assets/js/apply-form.js"></script>
</body>
</html>
