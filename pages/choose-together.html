<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Выбираем вместе - СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/choose-together.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка с кнопкой назад -->
        <div class="back-header">
            <div class="back-btn" onclick="goBack()">
                <i class="bi bi-arrow-left"></i>
            </div>
            <h1 class="gradient-title">Выбираем вместе</h1>
            <div style="width: 32px;"></div>
        </div>
        
        <div class="content-scroll" style="padding-top: 0;">
            <!-- Баннер -->
            <div class="choose-header">
                <p>Создайте группу с друзьями и найдите мероприятие, которое понравится всем</p>
            </div>
            
            <!-- Кнопка создания чата -->
            <button class="create-chat-btn" onclick="navigateTo('create-chat.html')">
                <i class="bi bi-plus-circle"></i> Создать чат
            </button>
            
            <!-- Список чатов -->
            <div class="chats-section">
                <h2>Мои чаты</h2>
                <div id="chatsList"></div>
            </div>
        </div>
        
        <!-- Нижняя навигация -->
        <nav class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="openSideMenu()">
                <i class="bi bi-list"></i>
            </div>
            <div class="nav-icon-item" onclick="navigateTo('../index.html')">
                <i class="bi bi-house-door-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Все мероприятия (в разработке)')">
                <i class="bi bi-ticket-perforated-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Избранное (в разработке)')">
                <i class="bi bi-heart-fill"></i>
            </div>
            <div class="nav-icon-item" onclick="alert('Личный кабинет (в разработке)')">
                <i class="bi bi-person-fill"></i>
            </div>
        </nav>
    </div>
    
    <script src="../assets/js/choose-together.js"></script>
</body>
</html>
