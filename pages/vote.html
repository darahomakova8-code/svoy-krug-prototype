<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Выбор мероприятий - СвойКруг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/vote.css">
</head>
<body>
    <div class="vote-container">
        <!-- Шапка -->
        <div class="vote-header">
            <div class="vote-header-left">
                <div class="back-btn" onclick="goBack()">
                    <i class="bi bi-arrow-left"></i>
                </div>
                <h1>Выбор мероприятия</h1>
            </div>
            <div style="width: 32px;"></div>
        </div>
        
        <!-- Прогресс-бар -->
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-counter" id="progressCounter">0/5</div>
        </div>
        
        <!-- Карточка мероприятия -->
        <div class="card-container" id="eventCard">
            <!-- Контент генерируется через JS -->
        </div>
        
        <!-- Кнопки действий -->
        <div class="action-buttons" id="actionButtons">
            <button class="action-btn dislike-btn" onclick="dislikeEvent()">
                <i class="bi bi-x-lg"></i>
            </button>
            <button class="action-btn like-btn" onclick="likeEvent()">
                <i class="bi bi-heart-fill"></i>
            </button>
        </div>
    </div>
    
    <script src="../assets/js/vote.js"></script>
</body>
</html>
